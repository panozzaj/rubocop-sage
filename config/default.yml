Sage/Capybara/PreferNoMethods:
  Description: 'Use `has_no_*?` instead of `!has_*?` for Capybara matchers to handle asynchronous behavior.'
  Enabled: true
  VersionAdded: '0.1'
  StyleGuide: 'https://github.com/teamcapybara/capybara#asynchronous-javascript-ajax-and-friends'

Sage/Capybara/AvoidExplicitVisible:
  Description: 'Avoid explicit `visible: true` in Capybara matchers as it is the default behavior.'
  Enabled: true
  VersionAdded: '0.1'

Sage/Capybara/NoWaitZero:
  Description: 'Avoid `wait: 0` in Capybara finders as it disables waiting and causes flaky tests.'
  Enabled: true
  VersionAdded: '0.1'

Sage/Capybara/MatchStyle:
  Description: 'Prefer `first()` or `match: :first` over `all().first`, and verify count before using `all().last`.'
  Enabled: true
  VersionAdded: '0.1'

Sage/Rails/AllWithBlock:
  Description: '`.all` ignores blocks. Use `.find_each` or `.all.each` instead.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/NoEnvAssignment:
  Description: 'Use ClimateControl to modify ENV in tests instead of direct assignment.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/NoEnvStubbing:
  Description: 'Use ClimateControl instead of stubbing ENV in tests.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/NoRailsEnvStubbing:
  Description: 'Don''t stub Rails.env in tests. Extract environment-dependent behavior behind configuration instead.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/NoConditionals:
  Description: 'Avoid conditional statements in test examples for deterministic tests.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/NoRescue:
  Description: 'Avoid rescue blocks in test examples. Tests should fail loudly.'
  Enabled: true
  VersionAdded: '0.1'

Sage/RSpec/PreferHaveHttpStatus:
  Description: 'Use `have_http_status` instead of predicate matchers like `be_successful` on response objects for clearer failure messages.'
  Enabled: true
  VersionAdded: '0.1'
